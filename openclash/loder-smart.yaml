# 自己手搓的配置文件，参考：https://wiki.metacubex.one/example/conf/

# 锚点
pr:
  &pr {
    type: select,
    proxies:
      [
        智能选择,
        香港智能,
        台湾智能,
        日本智能,
        新加坡智能,
        美国智能,
        全部节点,
        直连,
      ],
  }
p:
  &p {
    type: http,
    interval: 3600,
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      },
  }
# url 里填写自己的订阅,名称不能重复
proxy-providers:
  hongxingyun:
    <<: *p
    url: "https://106.55.228.246:36666/hxvip?token=b7a6e5eabcebd869a730050e1b6b184c"
  mojie:
    <<: *p
    url: "https://47.242.128.61:5000/api/v1/client/subscribe?token=f2db054b12517e2726c87a2f4910cf02"
ipv6: true
allow-lan: true
mixed-port: 7890
external-controller: 127.0.0.1:9090
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "+.lan"
    - "+.local"
  default-nameserver:
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

#直连，固定写法
proxies:
  - name: "直连"
    type: direct
    udp: true

# 节点组
proxy-groups:
  - { name: Google, <<: *pr }
  - { name: Github, <<: *pr }
  - { name: YouTube, <<: *pr }
  - { name: Docker, <<: *pr }
  - {
      name: OpenAi,
      type: select,
      proxies:
        [
          OpenAI智能,
          智能选择,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
          直连,
        ],
    }
  - {
      name: TikTok,
      type: select,
      proxies:
        [
          TikTok智能,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
          直连,
        ],
    }
  - {
      name: 国内,
      type: select,
      proxies:
        [
          直连,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
        ],
    }
  - {
      name: 漏网之鱼,
      type: select,
      proxies:
        [
          直连,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
        ],
    }
    # 智能节点组
  - {
      #所有节点智能选择，过滤掉一些明显不合适的节点（如直连、官网、剩余、异常、套餐、流量等），其他的都让它去测延迟
      name: 智能选择,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)^(?!.*(?:直连|官网|剩余|异常|套餐|流量|邮箱)).*",
    }
  - {
      name: 香港智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(香港|hk|hongkong|hong kong)",
    }
  - {
      name: 台湾智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(台湾|tw|taiwan)",
    }
  - {
      name: 日本智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(日本|jp|japan)",
    }
  - {
      name: 新加坡智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(新加坡|sg|singapore)",
    }
  - {
      name: 美国智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(美国|us|unitedstates|united states)",
    }
  - {
      name: OpenAI智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(日本|jp|japan|新加坡|sg|singapore|美国|us|united states)",
    }
  - {
      name: TikTok智能,
      type: smart,
      uselightgbm: true,
      collectdata: false,
      include-all: true,
      interval: 300,
      filter: "(?i)(日本|jp|japan|美国|us|unitedstates|新加坡|sg|singapore)",
    }

  - { name: 全部节点, type: select, include-all: true }

#域名组
rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: text }
  domain:
    &domain { type: http, interval: 86400, behavior: domain, format: text }
rule-providers:
  # 国内域名
  cn_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.list"
    # 国内IP
  cn_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.list"
  # google 域名
  google_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.list"
  # google IP
  google_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.list"
  #docker 域名
  docker_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/docker.list"
  #github 域名
  github_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.list"
  #openai 域名
  openai_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.list"
  #youtube 域名
  youtube_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.list"
  #tiktok 域名
  tiktok_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.list"
  gwf_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/gfw.list"

rules:
  - GEOIP,lan,直连,no-resolve
  - RULE-SET,docker_domain,Docker
  - RULE-SET,github_domain,Github
  - RULE-SET,openai_domain,OpenAi
  - RULE-SET,tiktok_domain,TikTok
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,google_ip,Google
  - RULE-SET,gwf_domain,智能选择
  - RULE-SET,cn_domain,国内
  - RULE-SET,cn_ip,国内
  - MATCH,漏网之鱼
