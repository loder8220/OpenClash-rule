# 自己手搓的配置文件，参考：https://wiki.metacubex.one/example/conf/

#使用smart智能
#使用GEO数据库

# 锚点
pr:
  &pr {
    type: select,
    proxies:
      [
        智能选择,
        香港智能,
        台湾智能,
        日本智能,
        新加坡智能,
        美国智能,
        全部节点,
        直连,
      ],
  }
p:
  &p {
    type: http,
    interval: 3600,
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      },
  }
# url 里填写自己的订阅,名称不能重复
proxy-providers:
  hongxingyun:
    <<: *p
    url: "https://106.55.228.246:36666/hxvip?token=b7a6e5eabcebd869a730050e1b6b184c"
  mojie:
    <<: *p
    url: "https://47.242.128.61:5000/api/v1/client/subscribe?token=f2db054b12517e2726c87a2f4910cf02"
ipv6: true
allow-lan: true
mixed-port: 7890
external-controller: 127.0.0.1:9090
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "+.lan"
    - "+.local"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

#直连，固定写法
proxies:
  - name: "直连"
    type: direct
    udp: true

# 节点组
proxy-groups:
  - { name: Google, <<: *pr }
  - { name: Github, <<: *pr }
  - { name: YouTube, <<: *pr }
  - { name: Docker, <<: *pr }
  - {
      name: OpenAi,
      type: select,
      proxies:
        [
          OpenAI智能,
          智能选择,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
          直连,
        ],
    }
  - {
      name: TikTok,
      type: select,
      proxies:
        [
          TikTok智能,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
          直连,
        ],
    }
  - {
      name: 国内,
      type: select,
      proxies:
        [
          直连,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
        ],
    }
  - {
      name: 国外域名,
      type: select,
      proxies:
        [
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
          直连,
        ],
    }
  - {
      name: 漏网之鱼,
      type: select,
      proxies:
        [
          直连,
          智能选择,
          香港智能,
          台湾智能,
          日本智能,
          新加坡智能,
          美国智能,
          全部节点,
        ],
    }

  # 智能节点组
  - {
      #所有节点智能选择，只选择主流地区的节点
      name: 智能选择,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(香港|hk|hongkong|台湾|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|美国|us|unitedstates|united states)",
    }
  - {
      name: 香港智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(香港|hk|hongkong|hong kong)",
    }
  - {
      name: 台湾智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(台湾|tw|taiwan)",
    }
  - {
      name: 日本智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(日本|jp|japan)",
    }
  - {
      name: 新加坡智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(新加坡|sg|singapore)",
    }
  - {
      name: 美国智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(?!直连)(美国|us|unitedstates|united states)",
    }
  - {
      name: OpenAI智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(日本|jp|japan|新加坡|sg|singapore|美国|us|united states)",
    }
  - {
      name: TikTok智能,
      type: smart,
      uselightgbm: true,
      collectdata: true,
      include-all: true,
      interval: 300,
      filter: "(?i)(日本|jp|japan|美国|us|unitedstates|新加坡|sg|singapore)",
    }
  - { name: 全部节点, type: select, include-all: true }

#规则
rules:
  # 局域网设备直连
  - SRC-IP-CIDR,192.168.31.8/29,直连
  - SRC-IP-CIDR,192.168.31.16/28,直连
  - SRC-IP-CIDR,192.168.31.32/27,直连
  # 目的地址是私网地址走直连
  - GEOIP,lan,直连,no-resolve
  # OpenAI
  - GEOSITE,openai,OpenAi
  # Docker
  - GEOSITE,docker,Docker
  # TikTOK
  - GEOSITE,tiktok,TikTok
  #
  - GEOSITE,google,Google
  # YouTube
  - GEOSITE,youtube,YouTube
  # Github
  - GEOSITE,github,Github
  # GFW
  - GEOSITE,gfw,智能选择
  # 非国内
  - GEOSITE,geolocation-!cn,国外域名
  # 国内
  - GEOSITE,cn,国内
  - GEOIP,cn,国内,no-resolve
  # 漏网之鱼
  - MATCH,漏网之鱼
