#规则
rules:
  # 源地址8-63不走代理
  - SRC-IP-CIDR,192.168.31.8/29,直连
  - SRC-IP-CIDR,192.168.31.16/28,直连
  - SRC-IP-CIDR,192.168.31.32/27,直连
  # 目的地址是私网地址走直连
  - GEOIP,lan,直连,no-resolve
  # OpenAI
  - GEOSITE,openai,OpenAi
  # Docker
  - GEOSITE,docker,Docker
  # TikTOK
  - GEOSITE,tiktok,TikTok
  # Github
  - GEOSITE,github,Github
  # YouTube
  - GEOSITE,youtube,YouTube
  # Google
  - GEOSITE,google,Google
  # GFW
  - GEOSITE,gfw,智能选择
  # 非国内
  - GEOSITE,geolocation-!cn,国外非gfw
  # 国内
  - GEOSITE,cn,国内
  - GEOIP,cn,国内,no-resolve
  # 漏网之鱼
  - MATCH,漏网之鱼
